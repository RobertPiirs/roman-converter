<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roman Numeral Converter</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Courier New', monospace;
            background: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 12px;
            padding: 40px;
            width: 420px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        h1 {
            font-size: 1.4rem;
            color: #e94560;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .subtitle {
            text-align: center;
            font-size: 0.75rem;
            color: #555;
            margin-bottom: 32px;
        }

        label {
            font-size: 0.8rem;
            color: #888;
            display: block;
            margin-bottom: 6px;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px 16px;
            background: #0f3460;
            border: 1px solid #1a4a8a;
            border-radius: 6px;
            color: #e0e0e0;
            font-family: inherit;
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 16px;
        }

        input[type="number"]:focus {
            border-color: #e94560;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #e94560;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            letter-spacing: 1px;
            transition: background 0.2s;
        }

        button:hover { background: #c73652; }

        .result {
            margin-top: 28px;
            text-align: center;
            min-height: 60px;
        }

        .roman {
            font-size: 2.4rem;
            color: #e94560;
            letter-spacing: 4px;
        }

        .error {
            font-size: 0.85rem;
            color: #f0a500;
        }

        .footer {
            text-align: center;
            margin-top: 32px;
            font-size: 0.7rem;
            color: #333;
        }

        a { color: #0f3460; text-decoration: none; }
        a:hover { color: #e94560; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Roman Converter</h1>
        <p class="subtitle">Integer [1 – 3999] → Roman numeral</p>

        <label for="numberInput">Enter a number</label>
        <input type="number" id="numberInput" placeholder="e.g. 1994" min="1" max="3999">
        <button onclick="convert()">Convert</button>

        <div class="result" id="result"></div>

        <div class="footer">
            <a href="test.html">Run tests →</a>
        </div>
    </div>

    <script src="converter.js"></script>
    <script>
        function convert() {
            const raw = document.getElementById('numberInput').value;
            const resultDiv = document.getElementById('result');

            try {
                const n = Number(raw);
                const roman = convertToRoman(n);
                resultDiv.innerHTML = `<span class="roman">${roman}</span>`;
            } catch (e) {
                resultDiv.innerHTML = `<span class="error">${e.message}</span>`;
            }
        }

        document.getElementById('numberInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') convert();
        });
    </script>
</body>
</html>
